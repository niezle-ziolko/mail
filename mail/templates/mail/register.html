{% extends "mail/layout.html" %}

{% block body %}
<div class="container-login">
<div>
    <img src="/static/logo-light.png" style="width:300px;">
    <h2 style="margin-top: 80px;">Register</h2>
</div>
<div>

    {% if message %}
        <div class="error">{{ message }}</div>
    {% endif %}

    <form action="{% url 'register' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <input class="form-control" type="email" name="email" placeholder="Email Address">
        </div>
        <div class="form-group">
            <input class="form-control" type="password" name="password" placeholder="Password">
        </div>
        <div class="form-group">
            <input class="form-control" type="password" name="confirmation" placeholder="Confirm Password">
        </div>
        <input class="button-primary" type="submit" value="Register">
    </form>

    <p style="font-size: 14px;">Already have an account? <a href="{% url 'login' %}">Log In here.</a></p>
</div>
</div>
{% endblock %}
