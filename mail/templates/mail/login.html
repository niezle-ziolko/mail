{% extends "mail/layout.html" %}

{% block body %}
    <img src="/static/logo-light.png" style="width:300px; ;margin-bottom: 80px">
    <h2>Login</h2>

    {% if message %}
        <div>{{ message }}</div>
    {% endif %}

    <form action="{% url 'login' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <input autofocus class="form-control" type="email" name="email" placeholder="Email">
        </div>
        <div class="form-group">
            <input class="form-control" type="password" name="password" placeholder="Password">
        </div>
        <input class="button-primary" type="submit" value="Login">
    </form>

    <p style="font-size: 14px;">Don't have an account? <a href="{% url 'register' %}">Register here.</a></p>

{% endblock %}
